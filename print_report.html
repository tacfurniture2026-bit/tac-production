<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>月次製造原価報告書 - TAC製造部</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0B2D48;
            --color-text: #1e293b;
            --color-border: #cbd5e1;
            --color-bg: #f1f5f9;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            color: var(--color-text);
            background-color: var(--color-bg);
            padding: 20px;
        }
        .toolbar {
            max-width: 1000px;
            margin: 0 auto 20px auto;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toolbar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-secondary {
            background-color: #e2e8f0;
            color: #475569;
        }
        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }
        .print-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            min-height: 297mm;
        }
        @media print {
            body {
                background-color: white;
                padding: 0;
                color: black;
            }
            .toolbar {
                display: none !important;
            }
            .print-container {
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                width: 100% !important;
                border-radius: 0 !important;
            }
            @page {
                size: A4 portrait;
                margin: 12mm 10mm 12mm 10mm;
            }
            /* 全ての要素で背景色と文字色を強制的に印刷する */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-title">🏭 TAC製造部 - 月次製造原価報告書 印刷</div>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="window.close()">✕ 閉じる</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ A4サイズで印刷</button>
        </div>
    </div>
    <div class="print-container" id="report-print-target">
        <!-- レポート内容が動的に生成されます -->
    </div>
    <script>
        window.onload = function() {
            const dataJson = sessionStorage.getItem('print_report_data');
            if (!dataJson) {
                document.getElementById('report-print-target').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #ef4444; font-weight: bold;">
                        印刷対象のデータが選択されていません。月次報告画面からPDF出力を実行してください。
                    </div>
                `;
                return;
            }
            const data = JSON.parse(dataJson);
            document.getElementById('report-print-target').innerHTML = data.html;
            
            // 印刷プレビューを少し遅延させて自動起動 (ブラウザ保護を回避)
            setTimeout(() => {
                window.print();
            }, 500);
        };
    </script>
</body>
</html>
