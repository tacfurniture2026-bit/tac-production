<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Test New QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <script>
    try {
      let longStr = "A".repeat(1600); // 1600 bytes
      QRCode.toDataURL(longStr, { errorCorrectionLevel: 'L', width: 256 }, function(err, url) {
        if (err) {
          console.error("Error generating DataURL:", err);
        } else {
          console.log("Success! DataURL length:", url.length);
          document.body.innerHTML = `<img src="${url}">`;
        }
      });
    } catch(e) {
      console.error(e.message);
    }
  </script>
</body>
</html>
